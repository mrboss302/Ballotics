name: Nightly Data Sync

on:
  schedule:
    - cron: '0 8 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Vote Scraper
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper.py

      - name: Run Member Scraper
        # No API keys needed for this script since it hits public XML endpoints!
        run: python members_scraper.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add both generated JSON files to the commit
          git add latest-votes.json latest-members.json
          
          git commit -m "Automated nightly data sync (Votes & Members)" || echo "No changes to commit"
          git push
