name: Nightly Vote Sync

on:
  schedule:
    - cron: '0 8 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      # This opts you into Node.js 24 now, clearing the warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        # v4 is actually okay, but we'll ensure the runner uses Node 24
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # This helps prevent library conflicts by caching
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper.py

      - name: Commit and Push JSON File
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add latest-votes.json
          git commit -m "Automated nightly data sync" || echo "No changes to commit"
          git push
