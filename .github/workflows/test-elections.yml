name: Test GA Election Scraper

# The workflow_dispatch trigger means this ONLY runs when you click the button manually
on:
  workflow_dispatch: 

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        # We only need the requests library for this test
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run the Scraper
        run: python ga_election_test.py
